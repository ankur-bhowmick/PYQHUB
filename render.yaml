services:
  - type: web
    name: pyqhub
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server.js
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 24d
      - key: BCRYPT_SALT
        value: "10"
      - key: NODE_ENV
        value: production
